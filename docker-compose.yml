services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: surl-api:latest
    container_name: surl_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DEBUG=False
    volumes:
      - screenshots:/app/screenshots
      - logs:/app/logs
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=128m

volumes:
  screenshots:
    driver: local
  logs:
    driver: local
